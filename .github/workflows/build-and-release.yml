name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Windows packages
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: release/*
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Linux packages
        run: npm run electron:build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: release/*
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build macOS packages
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: release/*
          retention-days: 7

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure of downloaded files
        run: ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-builds/*
            artifacts/linux-builds/*
            artifacts/macos-builds/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: ${{ github.event.inputs.release_version || github.ref_name }}
          body: |
            ## 离线OCR识别工具
            
            ### ✨ 功能特性
            - 📝 单张图片OCR识别
            - 📚 批量图片OCR识别  
            - 🌍 支持26国语言自动识别
            - 🔍 智能语种检测
            - ⚡ 高性能识别引擎
            - 💻 完全离线运行
            - 🎨 现代化 UI 界面
            
            ### 📦 安装包说明
            
            #### Windows
            - `*.exe` - NSIS 安装程序(推荐)
            - `*-x64.exe` - 64位独立安装包
            - `*-ia32.exe` - 32位独立安装包
            - `*.zip` - 便携版(免安装)
            
            #### Linux
            - `*.AppImage` - 通用 Linux 格式
            - `*.deb` - Debian/Ubuntu
            - `*.rpm` - RedHat/Fedora
            
            #### macOS
            - `*.dmg` - macOS 安装包
            - `*.zip` - macOS 压缩包
            
            ### 🔧 技术栈
            - Vue 3 + TypeScript
            - Electron 41
            - Tesseract.js 7.0
            - Vite 8.0
            
            ### 📖 使用说明
            1. 下载对应系统的安装包
            2. 安装并运行应用
            3. 选择或拖拽图片
            4. 点击开始识别
            5. 复制识别结果
            
            完整文档请查看 README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
